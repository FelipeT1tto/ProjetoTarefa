<!-- templates/notes.html -->
{% extends 'base.html' %}

{% block title %}Minhas Anotações{% endblock %}

{% block content %}
<h3>Anotações</h3>
<form method="post" action="/notes">
    <div class="mb-3">
        <textarea name="content" rows="10" class="form-control" placeholder="Escreva suas anotações aqui...">{{ notes }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
</form>
{% endblock %}
